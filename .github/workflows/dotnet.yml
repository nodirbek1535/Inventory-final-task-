name: InvenTrack Build Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
    
jobs:
  build:
    runs-on: windows-2022
    
    steps:
    - name: Check out
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        include-prerelease: true
        
    - name: Restore
      run: dotnet restore InvenTrack.Api.csproj
      
    - name: Build
      run: dotnet build InvenTrack.Api.csproj --no-restore
      
    - name: Test
      run: dotnet test InvenTrack.Api.csproj --no-build --verbosity normal
